services:
  - type: web
    name: domain-monitoring-web
    env: docker
    plan: free
    dockerfilePath: ./docker/render/Dockerfile
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: domain-monitoring-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: domain-monitoring-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: domain-monitoring-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: domain-monitoring-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: domain-monitoring-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync

databases:
  - name: domain-monitoring-db
    plan: free
