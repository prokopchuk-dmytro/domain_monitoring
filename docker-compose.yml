services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: domain-monitor-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  web:
    image: nginx:1.27-alpine
    container_name: domain-monitor-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - appnet

  db:
    image: mysql:8.4
    container_name: domain-monitor-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: domain_monitor
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - appnet

  node:
    image: node:22-alpine
    container_name: domain-monitor-node
    working_dir: /var/www
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www
    networks:
      - appnet

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: domain-monitor-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

volumes:
  dbdata:

networks:
  appnet:
    driver: bridge
